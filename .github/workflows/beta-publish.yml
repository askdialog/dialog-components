name: Beta Publish

on:
  push:
    branches:
      - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-beta:
    name: Publish Beta to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changesets
        id: changesets
        run: |
          CHANGESETS=$(find .changeset -name "*.md" ! -name "README.md" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$CHANGESETS" -gt 0 ]; then
            echo "has_changesets=true" >> $GITHUB_OUTPUT
          else
            echo "has_changesets=false" >> $GITHUB_OUTPUT
          fi

      # Snapshot release: bumps versions to e.g. 0.0.0-beta-20260526123045
      # in-memory only — does NOT modify committed files, does NOT consume
      # changesets. Nothing is pushed back to staging, so staging stays in
      # sync with main and merging staging -> main is conflict-free.
      - name: Version packages (snapshot)
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm changeset version --snapshot beta

      - name: Build packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm build

      - name: Publish snapshot to npm (beta tag)
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm changeset publish --tag beta --no-git-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
